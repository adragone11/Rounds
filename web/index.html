<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rounds — Schedule Builder for recurring work</title>
    <meta name="description" content="Rounds — Schedule Builder for recurring work. Plan your week in 5 minutes." />
    <script>
      // Apply stored theme before paint to avoid a white flash in dark mode.
      (function () {
        try {
          var stored = localStorage.getItem('@app_theme');
          var theme = (stored === 'light' || stored === 'dark')
            ? stored
            : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
        } catch (_) { /* noop */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
